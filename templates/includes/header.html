<header id="main-header" class="glass-light sticky top-0 z-20 px-4 md:px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
        <button id="mobile-menu-btn" class="lg:hidden icon-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
        <h2 id="page-title" class="text-xl md:text-2xl font-bold">
            {% block page_title %}Dashboard{% endblock %}
        </h2>
    </div>
    
    <div class="flex items-center gap-4">
        <button class="relative icon-btn">
            <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <span class="notification-badge pulse-neon"></span>
        </button>
        
        <div class="flex items-center gap-3 profile-info">
            <div class="avatar-box gradient-btn text-white font-bold">
                {{ request.user.get_initials|default:"JD" }}
            </div>
            <div class="hidden md:block">
                <p class="text-sm font-medium">{{ request.user.get_full_name|default:"João Dev" }}</p>
                <p class="text-xs text-slate-400">{{ request.user.get_role|default:"Administrador" }}</p>
            </div>
        </div>
    </div>
</header>
