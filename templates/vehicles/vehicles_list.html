{% extends "base.html" %}
{% load static %}

{% block title %}Veículos - AutoNex{% endblock %}

{% block content %}
<div class="min-h-full w-full">
    <div class="flex h-full">
        
        <div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="toggleSidebar()"></div>
        
        <main class="flex-1 lg:ml-0 overflow-auto">
            
            <div class="p-4 md:p-8 space-y-6">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <h3 class="text-lg font-semibold text-white">Estoque de Veículos</h3>
                    <button class="gradient-btn px-6 py-3 rounded-xl text-white font-medium flex items-center gap-2 transition-transform hover:scale-105">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                        </svg> Novo Veículo
                    </button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    
                    <div class="vehicle-card neon-border group">
                        <div class="vehicle-img-placeholder">
                            <svg class="w-20 h-20 text-slate-600 group-hover:text-cyan-500/50 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                            </svg>
                        </div>
                        <div class="p-6">
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="font-bold text-white">BMW X5</h4>
                                <span class="badge badge-success">Disponível</span>
                            </div>
                            <p class="text-slate-400 text-sm mb-4">2024 • 0 km • Branco</p>
                            <div class="flex items-center justify-between">
                                <span class="text-xl font-bold text-cyan-400">R$ 485.000</span>
                                <button class="action-btn-circle" title="Editar Veículo">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    </div>
            </div>
        </main>
    </div>
</div>
{% endblock %}
